<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dithering Terminal</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="crt">
    <header class="terminal-header">
      <h1>Dithering v1.0</h1>
      <p class="subtitle">SYSTEM READY</p>
    </header>

    <main class="terminal">
      <div id="output"></div>

      <div class="input-line">
        <span>&gt;</span>
        <input id="input" autocomplete="off" autofocus />
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
